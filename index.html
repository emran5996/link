    <style>
        /* Здесь настраивается внешний вид сайта */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #FFF8DC; /* Цвет фона всего сайта */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        /* Настройка большого шрифта на весь экран */
        .big-text {
            font-size: 5rem; /* Размер шрифта. Можешь менять число (например на 3 или 8) */
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        /* Настройка обычного текста */
        .description {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        /* Настройка ссылки (сделаем её похожей на красивую кнопку) */
        .my-link {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff; /* Цвет кнопки */
            color: white;
            text-decoration: none; /* Убирает подчеркивание */
            border-radius: 14px; /* Скругление углов */
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .my-link:hover {
            background-color: #0056b3; /* Цвет при наведении */
        }

        /* Настройка картинки */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 17px;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
