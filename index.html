<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emr1k_client</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0a0f, #000000 80%);
    color: white;
    overflow-x: hidden;
}

/* АНИМАЦИЯ ПОЯВЛЕНИЯ */
.fade-in {
    animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* СЛАЙДЫ */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

.active {
    display: flex;
}

/* КАРТОЧКА */
.card {
    background: rgba(255,255,255,0.03);
    border-radius: 25px;
    padding: 30px;
    border: 1px solid rgba(140, 0, 255, 0.2);
    backdrop-filter: blur(15px);
    max-width: 400px;
    width: 100%;
    box-shadow: 0 0 30px rgba(140, 0, 255, 0.15);
    animation: fadeIn 0.7s ease;
}

/* КНОПКИ */
.btn {
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
    position: relative;
    overflow: hidden;
}

/* ЭФФЕКТ СВЕЧЕНИЯ */
.btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

.btn:hover::after {
    left: 100%;
}

.btn-purple {
    background: linear-gradient(45deg, #5f00ff, #9b00ff);
    box-shadow: 0 0 15px rgba(140,0,255,0.5);
}

.btn-green {
    background: linear-gradient(45deg, #00c853, #00e676);
    box-shadow: 0 0 10px rgba(0,255,100,0.4);
}

.btn-red {
    background: linear-gradient(45deg, #ff1744, #ff5252);
    box-shadow: 0 0 10px rgba(255,0,80,0.4);
}

.btn:hover {
    transform: scale(1.05);
}

/* WARNING */
.warning {
    margin-top: 15px;
    padding: 12px;
    border: 1px solid rgba(255,0,0,0.5);
    border-radius: 12px;
    color: #ff6b6b;
    box-shadow: 0 0 10px rgba(255,0,0,0.2);
}

/* КАРТИНКА */
.product-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(140,0,255,0.3);
}

/* ПРОГРЕСС */
.progress {
    width: 100%;
    height: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 20px;
    border: 1px solid rgba(0,150,255,0.2);
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    box-shadow: 0 0 15px rgba(0,150,255,0.6);
    transition: width 0.2s;
}

</style>
</head>

<body>

<!-- СЛАЙД 1 -->
<div class="slide active">
    <div class="card fade-in">
        <h1>ПОЛУЧИ ДОСТУП</h1>

        <!-- 🔧 ВСТАВЬ ССЫЛКУ -->
        <img src="ССЫЛКА_НА_КАРТИНКУ" class="product-img">

        <p>Нажмите кнопку ниже чтобы продолжить</p>

        <button class="btn btn-purple" onclick="nextSlide(2)">
            Продолжить
        </button>
    </div>
</div>

<!-- СЛАЙД 2 -->
<div class="slide">
    <div class="card fade-in">

        <h2>Выполните действия</h2>
        <p>Для получения доступа</p>

        <div class="warning">
            ⚠️ Важно: выполните все шаги
        </div>

        <button class="btn btn-red" onclick="markDone(this, 'https://t.me/ССЫЛКА_БОТА')">
            Перейти в бота
        </button>

        <button class="btn btn-red" onclick="markDone(this, 'https://t.me/ССЫЛКА_КАНАЛА')">
            Подписаться
        </button>

        <button class="btn btn-green" onclick="checkTasks()">
            Проверить
        </button>

    </div>
</div>

<!-- СЛАЙД 3 -->
<div class="slide">
    <div class="card fade-in">

        <h2>Подготовка доступа...</h2>
        <p>Пожалуйста подождите</p>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

    </div>
</div>

<!-- СЛАЙД 4 -->
<div class="slide">
    <div class="card fade-in">

        <h2>Готово!</h2>
        <p>Нажмите кнопку ниже</p>

        <button class="btn btn-purple" onclick="window.location.href='ССЫЛКА_НА_ПРОДУКТ'">
            Получить
        </button>

    </div>
</div>

<script>

let slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide(num) {
    slides[current].classList.remove('active');
    current = num - 1;
    slides[current].classList.add('active');
}

let botClicked = false;
let channelClicked = false;

function markDone(btn, link) {
    window.open(link, "_blank");

    btn.classList.remove('btn-red');
    btn.classList.add('btn-green');

    if (btn.innerText.includes("бота")) botClicked = true;
    if (btn.innerText.includes("Подписаться")) channelClicked = true;
}

function checkTasks() {
    if (botClicked && channelClicked) {
        nextSlide(3);
        startProgress();
    } else {
        alert("Сначала выполните все действия");
    }
}

function startProgress() {
    let bar = document.getElementById("progressBar");
    let width = 0;

    let interval = setInterval(() => {
        width += 2;
        bar.style.width = width + "%";

        if (width >= 100) {
            clearInterval(interval);
            setTimeout(() => nextSlide(4), 400);
        }
    }, 80);
}

</script>

</body>
</html>
