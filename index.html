<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emr1k_client</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0a0a0f, #000);
    color: white;
    overflow: hidden;
}

/* ⚡ ЧАСТИЦЫ (молнии) */
.particle {
    position: absolute;
    width: 2px;
    height: 20px;
    background: linear-gradient(#6a00ff, transparent);
    opacity: 0.5;
    animation: fall linear infinite;
}

@keyframes fall {
    from {transform: translateY(-100px);}
    to {transform: translateY(110vh);}
}

/* СЛАЙДЫ */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.active { display: flex; }

/* КАРТОЧКА */
.card {
    background: rgba(255,255,255,0.03);
    padding: 30px;
    border-radius: 25px;
    border: 1px solid rgba(140,0,255,0.3);
    box-shadow: 0 0 40px rgba(140,0,255,0.2);
    text-align: center;
    width: 90%;
    max-width: 400px;
}

/* КНОПКИ */
.btn {
    width: 100%;
    padding: 15px;
    margin-top: 12px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.15s ease, box-shadow 0.2s;
}

.btn:active {
    transform: scale(0.96);
}

/* ПУЛЬС */
@keyframes pulse {
    0% {box-shadow: 0 0 10px #6a00ff;}
    50% {box-shadow: 0 0 30px #9b00ff;}
    100% {box-shadow: 0 0 10px #6a00ff;}
}

.btn-purple {
    background: linear-gradient(45deg,#6a00ff,#9b00ff);
    color: white;
    animation: pulse 2s infinite;
}

.btn-red {
    background: linear-gradient(45deg,#ff1744,#ff5252);
    color: white;
}

.btn-green {
    background: linear-gradient(45deg,#00c853,#00e676);
    color: white;
}

/* КАРТИНКА */
img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 0 20px #6a00ff;
}

/* WARNING */
.warning {
    border: 1px solid red;
    padding: 10px;
    border-radius: 10px;
    margin: 10px 0;
    color: #ff6b6b;
}

/* ПРОГРЕСС */
.progress {
    width: 100%;
    height: 20px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
}

/* ОНЛАЙН */
.online {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<!-- ⚡ ЧАСТИЦЫ -->
<script>
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(p);
}
</script>

<!-- 🔊 ЗВУК -->
<audio id="clickSound" src="https://www.myinstants.com/media/sounds/mouse-click.mp3"></audio>

<!-- СЛАЙД 1 -->
<div class="slide active">
<div class="card">
<div class="online" id="online">Онлайн: 120</div>

<h1>ПОЛУЧИ ДОСТУП</h1>

<img src="ССЫЛКА_НА_КАРТИНКУ">

<button class="btn btn-purple" onclick="go(1)">
Продолжить
</button>
</div>
</div>

<!-- СЛАЙД 2 -->
<div class="slide">
<div class="card">

<h2>Выполни действия</h2>

<div class="warning">⚠️ Выполни все шаги</div>

<button class="btn btn-red" onclick="done(this,'https://t.me/ССЫЛКА_БОТА','b')">Бот</button>
<button class="btn btn-red" onclick="done(this,'https://t.me/КАНАЛ1','c1')">Подписаться</button>
<button class="btn btn-red" onclick="done(this,'https://t.me/КАНАЛ2','c2')">Подписаться</button>

<button class="btn btn-green" onclick="check()">Проверить</button>

</div>
</div>

<!-- СЛАЙД 3 -->
<div class="slide">
<div class="card">

<h2>Проверка...</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>
</div>

<!-- СЛАЙД 4 -->
<div class="slide">
<div class="card">

<h2>Готово</h2>

<button class="btn btn-purple" onclick="window.location.href='ССЫЛКА_ПРОДУКТА'">
Получить
</button>

</div>
</div>

<script>

let slides=document.querySelectorAll('.slide');
let cur=0;

function clickSound(){
document.getElementById("clickSound").play();
}

function go(n){
clickSound();
slides[cur].classList.remove('active');
cur=n;
slides[cur].classList.add('active');
}

let b=false,c1=false,c2=false;

function done(btn,link,type){
clickSound();
window.open(link);

btn.classList.remove('btn-red');
btn.classList.add('btn-green');

if(type=="b")b=true;
if(type=="c1")c1=true;
if(type=="c2")c2=true;
}

function check(){
clickSound();
if(b&&c1&&c2){
go(2);
let w=0;
let i=setInterval(()=>{
w+=2;
bar.style.width=w+"%";
if(w>=100){
clearInterval(i);
setTimeout(()=>go(3),500);
}
},60);
}else{
alert("Сделай все");
}
}

/* 👥 ОНЛАЙН */
let online=120;
setInterval(()=>{
online+=Math.floor(Math.random()*3-1);
document.getElementById("online").innerText="Онлайн: "+online;
},2000);

</script>

</body>
</html>
