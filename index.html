<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ к боту</title>
    <style>
        /* БЕЛЫЙ СТИЛЬ — МИНИМАЛИЗМ */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { font-size: 22px; margin-bottom: 15px; font-weight: 700; }
        p { font-size: 15px; color: #666; line-height: 1.4; margin-bottom: 20px; }

        /* КНОПКИ */
        .btn {
            display: block;
            background: #0088cc; /* Цвет Telegram */
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:active { transform: scale(0.98); }

        /* Вторая кнопка чуть другим оттенком, чтобы выделялась */
        .btn-alt {
            background: #0077b5;
        }

        /* ШАГИ (СКРЫТЫЕ ПО УМОЛЧАНИЮ) */
        .step { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }

        /* ПОЛОСКА ЗАГРУЗКИ */
        .loader-container {
            background: #eee;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            margin: 20px 0;
            overflow: hidden;
        }
        .loader-bar {
            background: #0088cc;
            height: 100%;
            width: 0%;
            transition: width 4.5s linear; /* Время имитации загрузки */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ШАГ 2: ВЫБОР БОТА (ГЛАВНЫЙ ЭКРАН) -->
        <div id="step2" class="step active">
                    <h1>ПОЛУЧИТЬ ДОСТУП</h1>
            <p>Для активации выберите любого свободного бота из списка ниже:</p>
            
            <!-- КНОПКА №1 -->
            <a href="https://t.me/banditplaybot?start=video8066351" target="_blank" class="btn" onclick="startCheck()">
                🤖 ПЕРЕЙТИ В БОТА #1
            </a>

            <!-- КНОПКА №2 (НОВАЯ) -->
            <a href="https://t.me/ССЫЛКА_НА_ВТОРОГО_БОТА" target="_blank" class="btn btn-alt" onclick="startCheck()">
                🤖 ПЕРЕЙТИ В БОТА #2
            </a>
        </div>

        <!-- ШАГ 3: ФЕЙК ЗАГРУЗКА -->
        <div id="step3" class="step">
            <h1 id="status-text">ПРОВЕРКА...</h1>
            <div class="loader-container">
                <div id="bar" class="loader-bar"></div>
            </div>
            <p id="log-text">Поиск аккаунта в базе данных...</p>
        </div>

        <!-- ШАГ 4: ФИНАЛ -->
        <div id="step4" class="step">
            <h1>Доступ открыт! ✅</h1>
            <p>Задание успешно. Теперь подпишитесь на основной канал с софтом.</p>
            <!-- ССЫЛКА НА ТВОЙ КАНАЛ -->
            <a href="https://nere.st/l/tg" class="btn">ПЕРЕЙТИ В КАНАЛ</a>
        </div>

    </div>

    <script>
        function go(s) {
            // Скрываем все шаги и показываем нужный
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
        }

        function startCheck() {
            // Переключаем на экран загрузки через небольшую паузу
            setTimeout(() => {
                go(3);
                const bar = document.getElementById('bar');
                const log = document.getElementById('log-text');
                
                // Запускаем анимацию полоски
                setTimeout(() => { bar.style.width = '100%'; }, 100);

                // Имитация процесса
                setTimeout(() => { log.innerText = "Синхронизация с сервером Telegram..."; }, 1500);
                setTimeout(() => { log.innerText = "Проверка подписки на бота..."; }, 3000);
                
                // Через 4.5 секунды перекидываем на финал
                setTimeout(() => {
                    go(4);
                }, 4500);
            }, 500);
        }
    </script>

</body>
</html>
