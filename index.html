<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emr1k_client</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0a0f, #000);
    color: #fff;
    overflow: hidden;
}

/* 🌌 ЧАСТИЦЫ */
.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
    background: radial-gradient(circle, #8a2be2, transparent);
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* СЛАЙДЫ */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.active { display: flex; }

/* КАРТОЧКА */
.card {
    background: rgba(255,255,255,0.04);
    padding: 30px;
    border-radius: 25px;
    border: 1px solid rgba(140,0,255,0.25);
    box-shadow: 0 0 40px rgba(140,0,255,0.15);
    text-align: center;
    width: 90%;
    max-width: 400px;
}

/* ✨ FADE */
.fade {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.6s forwards;
}

.delay1 { animation-delay: .2s; }
.delay2 { animation-delay: .4s; }
.delay3 { animation-delay: .6s; }
.delay4 { animation-delay: .8s; }

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}

/* КНОПКИ */
.btn {
    width: 100%;
    padding: 15px;
    margin-top: 12px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    transition: .2s;
}

.btn:hover {
    transform: translateY(-2px);
}

.btn-purple {
    background: linear-gradient(45deg,#6a00ff,#9b00ff);
    box-shadow: 0 0 20px rgba(140,0,255,0.4);
    color: #fff;
}

.btn-red {
    background: linear-gradient(45deg,#ff1744,#ff5252);
    color: #fff;
}

.btn-green {
    background: linear-gradient(45deg,#00c853,#00e676);
    color: #fff;
}

/* КАРТИНКА */
img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 0 20px rgba(140,0,255,0.3);
}

/* WARNING */
.warning {
    border: 1px solid rgba(255,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
    margin: 10px 0;
    color: #ff6b6b;
}

/* ПРОГРЕСС */
.progress {
    width: 100%;
    height: 20px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
}

/* 👥 ОНЛАЙН */
.online {
    font-size: 14px;
    margin-bottom: 10px;
    color: #fff;
    text-shadow: 0 0 10px #9b00ff, 0 0 20px #6a00ff;
}

</style>
</head>

<body>

<!-- 🌌 СОЗДАНИЕ ЧАСТИЦ -->
<script>
for(let i=0;i<20;i++){
    let p=document.createElement("div");
    p.className="particle";
    let size=Math.random()*6+4;
    p.style.width=size+"px";
    p.style.height=size+"px";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(Math.random()*10+10)+"s";
    document.body.appendChild(p);
}
</script>

<!-- 🔊 ЗВУК -->
<!-- 🔧 ЗАМЕНИ ССЫЛКУ НА СВОЙ ЗВУК -->
<audio id="clickSound" preload="auto">
<source src="ССЫЛКА_НА_ЗВУК" type="audio/mpeg">
</audio>

<!-- СЛАЙД 1 -->
<div class="slide active">
<div class="card">

<div class="online fade delay1" id="online"></div>

<h1 class="fade delay2">ПОЛУЧИ ДОСТУП</h1>

<img src="ССЫЛКА_НА_КАРТИНКУ" class="fade delay3">

<button class="btn btn-purple fade delay4" onclick="go(1)">
Продолжить
</button>

</div>
</div>

<!-- СЛАЙД 2 -->
<div class="slide">
<div class="card">

<h2 class="fade delay1">Выполни действия</h2>

<div class="warning fade delay2">⚠️ Выполни все шаги</div>

<button class="btn btn-red fade delay2" onclick="done(this,'https://t.me/ССЫЛКА_БОТА','b')">
Перейти в бота
</button>

<button class="btn btn-red fade delay3" onclick="done(this,'https://t.me/КАНАЛ1','c1')">
Подписаться
</button>

<button class="btn btn-red fade delay4" onclick="done(this,'https://t.me/КАНАЛ2','c2')">
Подписаться
</button>

<button class="btn btn-green fade delay4" onclick="check()">
Проверить
</button>

</div>
</div>

<!-- СЛАЙД 3 -->
<div class="slide">
<div class="card">

<h2 class="fade">Подготовка доступа...</h2>

<div class="progress fade delay1">
<div class="bar" id="bar"></div>
</div>

</div>
</div>

<!-- СЛАЙД 4 -->
<div class="slide">
<div class="card">

<h2 class="fade">Готово</h2>

<button class="btn btn-purple fade delay1" onclick="window.location.href='ССЫЛКА_ПРОДУКТА'">
Получить
</button>

</div>
</div>

<script>

let slides=document.querySelectorAll('.slide');
let cur=0;

let sound=document.getElementById("clickSound");

/* 🔊 мгновенный звук */
function playSound(){
    sound.currentTime = 0;
    sound.play().catch(()=>{});
}

function go(n){
playSound();
slides[cur].classList.remove('active');
cur=n;
slides[cur].classList.add('active');
}

let b=false,c1=false,c2=false;

function done(btn,link,type){
playSound();
window.open(link);

btn.classList.remove('btn-red');
btn.classList.add('btn-green');

if(type=="b")b=true;
if(type=="c1")c1=true;
if(type=="c2")c2=true;
}

function check(){
playSound();
if(b&&c1&&c2){
go(2);
let w=0;
let i=setInterval(()=>{
w+=2;
bar.style.width=w+"%";
if(w>=100){
clearInterval(i);
setTimeout(()=>go(3),500);
}
},60);
}else{
alert("Сделай все действия");
}
}

/* 👥 ОНЛАЙН РАНДОМ */
function updateOnline(){
let num=Math.floor(Math.random()*(247-50+1))+50;
document.getElementById("online").innerText="Сейчас онлайн: "+num;
}

updateOnline();
setInterval(updateOnline,2000);

</script>

</body>
</html>
