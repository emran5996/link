<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emr1k_client</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0a0f, #000);
    color: #fff;
    overflow: hidden;
}

/* 🌌 ЧАСТИЦЫ */
.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
    background: radial-gradient(circle, #8a2be2, transparent);
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* СЛАЙДЫ */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.active { display: flex; }

/* КАРТОЧКА */
.card {
    background: rgba(255,255,255,0.04);
    padding: 30px;
    border-radius: 25px;
    border: 1px solid rgba(140,0,255,0.25);
    box-shadow: 0 0 40px rgba(140,0,255,0.15);
    text-align: center;
    width: 90%;
    max-width: 400px;
}

/* ✨ FADE */
.fade {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.6s forwards;
}

.delay1 { animation-delay: .2s; }
.delay2 { animation-delay: .4s; }
.delay3 { animation-delay: .6s; }
.delay4 { animation-delay: .8s; }

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}

/* 🔘 КНОПКИ */
.btn {
    width: 100%;
    padding: 15px;
    margin-top: 12px;
    border-radius: 17px;
    border: 1px solid rgba(255,255,255,0.6); /* БЕЛАЯ ОБВОДКА */
    cursor: pointer;
    font-size: 16px;
    transition: 0.25s ease;
    position: relative;
}

/* 💫 ПУЛЬС ВСЕМ КНОПКАМ */
@keyframes softPulse {
    0% { box-shadow: 0 0 5px rgba(255,255,255,0.2); }
    50% { box-shadow: 0 0 20px rgba(255,255,255,0.6); }
    100% { box-shadow: 0 0 5px rgba(255,255,255,0.2); }
}

.btn {
    animation: softPulse 2.5s infinite;
}

/* HOVER */
.btn:hover {
    transform: translateY(-2px);
    border-color: #fff;
}

/* ЦВЕТА */
.btn-purple {
    background: linear-gradient(45deg,#6a00ff,#9b00ff);
    color: #fff;
}

.btn-red {
    background: linear-gradient(45deg,#ff1744,#ff5252);
    color: #fff;
}

.btn-green {
    background: linear-gradient(45deg,#00c853,#00e676);
    color: #fff;
}

/* КАРТИНКА */
img {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 15px;
    box-shadow: 0 0 20px rgba(140,0,255,0.3);
}

/* WARNING */
.warning {
    border: 1px solid rgba(255,0,0,0.5);
    padding: 10px;
    border-radius: 12px;
    margin: 10px 0;
    color: #ff6b6b;
}

/* ПРОГРЕСС */
.progress {
    width: 100%;
    height: 20px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
}

/* 👥 ОНЛАЙН */
.online {
    font-size: 14px;
    margin-bottom: 10px;
    color: #fff;
    text-shadow: 0 0 10px #fff, 0 0 20px #9b00ff;
}

</style>
</head>

<body>

<!-- 🌌 ЧАСТИЦЫ -->

for(let i=0;i<20;i++){

    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(Math.random()*10+10)+"s";
    document.body.appendChild(p);
}
</script>

<script>

let slides=document.querySelectorAll('.slide');
