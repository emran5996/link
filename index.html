<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emr1k_client</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0a0f, #000000 80%);
    color: white;
}

/* АНИМАЦИИ */
@keyframes fadeUp {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
    0% {box-shadow: 0 0 10px rgba(140,0,255,0.4);}
    50% {box-shadow: 0 0 25px rgba(140,0,255,0.8);}
    100% {box-shadow: 0 0 10px rgba(140,0,255,0.4);}
}

/* СЛАЙДЫ */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

.active {
    display: flex;
}

/* КАРТОЧКА */
.card {
    background: rgba(255,255,255,0.03);
    border-radius: 25px;
    padding: 30px;
    border: 1px solid rgba(140, 0, 255, 0.2);
    backdrop-filter: blur(15px);
    max-width: 400px;
    width: 100%;
    box-shadow: 0 0 30px rgba(140, 0, 255, 0.15);
    animation: fadeUp 0.6s ease;
}

/* КНОПКИ */
.btn {
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease;
}

/* ЗАДЕРЖКА ПОЯВЛЕНИЯ */
.delay1 { animation-delay: 0.2s; }
.delay2 { animation-delay: 0.4s; }
.delay3 { animation-delay: 0.6s; }
.delay4 { animation-delay: 0.8s; }

/* БЛИК */
.btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

.btn:hover::after {
    left: 100%;
}

/* СТИЛИ КНОПОК */
.btn-purple {
    background: linear-gradient(45deg, #5f00ff, #9b00ff);
    box-shadow: 0 0 15px rgba(140,0,255,0.5);
    animation: pulse 2s infinite;
}

.btn-green {
    background: linear-gradient(45deg, #00c853, #00e676);
    box-shadow: 0 0 10px rgba(0,255,100,0.4);
}

.btn-red {
    background: linear-gradient(45deg, #ff1744, #ff5252);
    box-shadow: 0 0 10px rgba(255,0,80,0.4);
}

/* НАЖАТИЕ */
.btn:active {
    transform: scale(0.95);
}

/* WARNING */
.warning {
    margin-top: 15px;
    padding: 12px;
    border: 1px solid rgba(255,0,0,0.5);
    border-radius: 12px;
    color: #ff6b6b;
    box-shadow: 0 0 10px rgba(255,0,0,0.2);
}

/* КАРТИНКА */
.product-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(140,0,255,0.3);
}

/* ПРОГРЕСС */
.progress {
    width: 100%;
    height: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 20px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    box-shadow: 0 0 15px rgba(0,150,255,0.6);
    transition: width 0.2s;
}

</style>
</head>

<body>

<!-- СЛАЙД 1 -->
<div class="slide active">
    <div class="card">
        <h1>ПОЛУЧИ ДОСТУП</h1>

        <!-- ВСТАВЬ КАРТИНКУ -->
        <img src="ССЫЛКА_НА_КАРТИНКУ" class="product-img">

        <p>Нажмите кнопку ниже</p>

        <button class="btn btn-purple delay1" onclick="nextSlide(2)">
            Продолжить
        </button>
    </div>
</div>

<!-- СЛАЙД 2 -->
<div class="slide">
    <div class="card">

        <h2>Выполните действия</h2>

        <div class="warning">
            ⚠️ Выполните все шаги
        </div>

        <!-- БОТ -->
        <button class="btn btn-red delay1" onclick="markDone(this, 'https://t.me/ССЫЛКА_БОТА', 'bot')">
            Перейти в бота
        </button>

        <!-- КАНАЛ 1 -->
        <button class="btn btn-red delay2" onclick="markDone(this, 'https://t.me/ССЫЛКА_КАНАЛА1', 'channel1')">
            Подписаться
        </button>

        <!-- КАНАЛ 2 (НОВЫЙ) -->
        <button class="btn btn-red delay3" onclick="markDone(this, 'https://t.me/ССЫЛКА_КАНАЛА2', 'channel2')">
            Подписаться
        </button>

        <button class="btn btn-green delay4" onclick="checkTasks()">
            Проверить
        </button>

    </div>
</div>

<!-- СЛАЙД 3 -->
<div class="slide">
    <div class="card">

        <h2>Подготовка доступа...</h2>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

    </div>
</div>

<!-- СЛАЙД 4 -->
<div class="slide">
    <div class="card">

        <h2>Готово</h2>

        <button class="btn btn-purple" onclick="window.location.href='ССЫЛКА_НА_ПРОДУКТ'">
            Получить
        </button>

    </div>
</div>

<script>

let slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide(num) {
    slides[current].classList.remove('active');
    current = num - 1;
    slides[current].classList.add('active');
}

let bot = false;
let ch1 = false;
let ch2 = false;

function markDone(btn, link, type) {
    window.open(link, "_blank");

    btn.classList.remove('btn-red');
    btn.classList.add('btn-green');

    if(type === 'bot') bot = true;
    if(type === 'channel1') ch1 = true;
    if(type === 'channel2') ch2 = true;
}

function checkTasks() {
    if (bot && ch1 && ch2) {
        nextSlide(3);
        startProgress();
    } else {
        alert("Выполни все действия");
    }
}

function startProgress() {
    let bar = document.getElementById("progressBar");
    let width = 0;

    let interval = setInterval(() => {
        width += 2;
        bar.style.width = width + "%";

        if (width >= 100) {
            clearInterval(interval);
            setTimeout(() => nextSlide(4), 400);
        }
    }, 80);
}

</script>

</body>
</html>
