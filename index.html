<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emr1k_client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Цветовая палитра */
            --color-primary-start: #6a11cb; /* Фиолетовый */
            --color-primary-end: #2575fc;   /* Синий */
            --color-button-start: #8e2de2;  /* Более насыщенный фиолетовый */
            --color-button-end: #4a00e0;    /* Более темный сине-фиолетовый */
            --color-text-white: #ffffff;
            --color-warning-red: rgba(255, 0, 0, 0.7);
            --color-warning-bg: rgba(255, 0, 0, 0.2);
            --color-progress-start: #4facfe;
            --color-progress-end: #00f2fe;
            --color-shadow-dark: rgba(0, 0, 0, 0.3);
            --color-glow-primary: rgba(106, 17, 203, 0.5);
            --color-glow-button: rgba(142, 45, 226, 0.6);
            --color-glow-warning: rgba(255, 0, 0, 0.5);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--color-primary-start) 0%, var(--color-primary-end) 100%);
            color: var(--color-text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .slide {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: inherit; /* Наследует фон body */
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
                        position: relative;
        }

        .content-wrapper {
            padding: 30px 20px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 25px; /* Более выраженное скругление */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Неоновая обводка */
            backdrop-filter: blur(15px); /* Увеличенный радиус размытия */
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 25px var(--color-glow-primary); /* Свечение */
            margin: 20px; /* Небольшой внешний отступ */
            width: calc(100% - 40px); /* Учет margin */
            max-width: 500px; /* Ограничение ширины */
        }

        h1, h2 {
            font-size: 2.8em; /* Немного увеличен шрифт */
            margin-bottom: 10px; /* Уменьшен отступ */
            line-height: 1.1;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); /* Темная тень для контраста */
        }

        h1 {
            font-size: 3.2em; /* Крупнее основной заголовок */
        }

        h2 {
            font-size: 2.2em; /* Меньше, чем H1 */
            background: none;
            -webkit-text-fill-color: initial;
            background-clip: initial;
            color: var(--color-text-white);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        p {
            font-size: 1.1em;
            margin-bottom: 25px;
            line-height: 1.5;
            opacity: 0.9;
            font-weight: 500;
        }

        .description-text {
            font-size: 1.2em;
            margin-bottom: 40px; /* Увеличен отступ */
        }

        .product-image-container {
            margin: 25px auto; /* Увеличены отступы */
            max-width: 95%;
            border: 3px solid var(--color-text-white);
            border-radius: 18px; /* Более выраженное скругление */
            overflow: hidden;
            box-shadow: 0 8px 20px var(--color-shadow-dark); /* Более выраженная тень */
        }

        .product-image {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 15px; /* Небольшой радиус внутри рамки */
        }

        .cta-button, .action-button {
            display: inline-block;
            padding: 18px 35px; /* Увеличенные размеры кнопки */
            font-size: 1.3em; /* Увеличен шрифт */
            font-weight: 700;
            text-decoration: none;
            color: var(--color-text-white);
            background: linear-gradient(90deg, var(--color-button-start) 0%, var(--color-button-end) 100%);
            border: none;
            border-radius: 35px; /* Сильно скругленные края */
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px var(--color-glow-button); /* Усиленное свечение */
            outline: none;
            margin-top: 25px; /* Увеличен отступ */
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .cta-button::before, .action-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.25) 0%, transparent 50%); /* Более яркое свечение */
            opacity: 0;
            transition: opacity 0.4s ease; /* Более долгий переход */
            z-index: -1;
        }

        .cta-button:hover, .action-button:hover {
            transform: translateY(-4px); /* Более ощутимый эффект поднятия */
            box-shadow: 0 12px 30px var(--color-glow-button); /* Усиленная тень при ховере */
        }

        .cta-button:hover::before, .action-button:hover::before {
            opacity: 1;
        }

        .warning-box {background-color: var(--color-warning-bg);
            border: 2px solid var(--color-warning-red);
            padding: 18px 25px; /* Увеличены размеры */
            border-radius: 18px;
            margin: 25px auto; /* Увеличены отступы */
            max-width: 85%; /* Увеличенная ширина */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; /* Отступ между иконкой и текстом */
            font-size: 1.05em;
            box-shadow: 0 0 18px var(--color-glow-warning);
        }

        .warning-icon {
            font-size: 1.8em; /* Крупнее иконка */
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px; /* Увеличен отступ между кнопками */
            margin-top: 30px;
        }

        .action-button {
            background: linear-gradient(90deg, #f093fb 0%, #f35672 100%); /* Розово-красный градиент */
            box-shadow: 0 8px 25px rgba(243, 86, 114, 0.7); /* Скорректирована тень */
        }

        .action-button:hover {
            box-shadow: 0 12px 30px rgba(243, 86, 114, 0.9);
        }

        .next-slide-button {
            margin-top: 35px; /* Увеличен отступ */
            background: linear-gradient(90deg, #2af598 0%, #009efd 100%); /* Зелено-синий градиент */
            box-shadow: 0 8px 25px rgba(0, 158, 253, 0.7);
        }

        .next-slide-button:hover {
            box-shadow: 0 12px 30px rgba(0, 158, 253, 0.9);
        }

        .progress-bar-container {
            width: 85%; /* Увеличенная ширина */
            max-width: 450px; /* Увеличенная максимальная ширина */
            margin: 35px auto; /* Увеличены отступы */
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 35px; /* Сильное скругление */
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            position: relative;
            height: 55px; /* Увеличенная высота */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15em; /* Увеличен шрифт */
            padding: 0 15px;
            box-sizing: border-box;
        }

        .progress-bar-fill {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: linear-gradient(90deg, var(--color-progress-start) 0%, var(--color-progress-end) 100%);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 4.5s ease-in-out; /* Немного увеличена длительность */
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-text {
            position: relative;
            z-index: 1;
            font-weight: 600; /* Немного жирнее */
            text-shadow: 0 0 8px rgba(0,0,0,0.4); /* Более выраженная тень */
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.8em;
            }
            h2 {
                font-size: 1.9em;
            }
            .content-wrapper {
                padding: 25px 15px;
                margin: 15px;
                width: calc(100% - 30px);
            }
            .warning-box {
                max-width: 95%;
                margin: 20px auto;
            }
            .progress-bar-container {
                width: 95%;
                margin: 25px auto;
            }
            .cta-button, .action-button {
                padding: 15px 25px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Слайд 1 -->
        <section id="slide-1" class="slide active">
        </div>
        </section>

    </div>

    <script>
        // Переменные для слайдов
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        // Функция для перехода к следующему слайду
        function scrollToNextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide++;
            if (currentSlide < slides.length) {
                slides[currentSlide].classList.add('active');
            } else {
                currentSlide = slides.length - 1; // Остаемся на последнем слайде
            }
        }

        // Функция для запуска имитации проверки подписки
        function startVerification() {
            // Скрываем текущий слайд и переходим на слайд 3 (Проверка)
            slides[currentSlide].classList.remove('active');
            currentSlide = 2; // Индекс слайда 3
            slides[currentSlide].classList.add('active');

            // Имитация заполнения полоски прогресса
            const progressBarFill = document.querySelector('.progress-bar-fill');
            if (progressBarFill) {
                progressBarFill.style.transform = 'scaleX(1)'; // Заполняем на 100%
            } else {
                console.error("Элемент .progress-bar-fill не найден!");
            }

            // Через 4.5 секунды переходим на слайд 4 (Получение приза)
            setTimeout(() => {
                if (currentSlide < slides.length) { 
                    slides[currentSlide].classList.remove('active');
                    currentSlide = 3; // Индекс слайда 4
                    if (currentSlide < slides.length) {
                        slides[currentSlide].classList.add('active');
                    }
                }
            }, 4500); // 4.5 секунды (4 секунды анимации + небольшой буфер)
        }

        // Функция для получения приза
        function getPrize() {
            // ВАЖНО: Замените 'YOUR_FINAL_LINK_HERE' на реальную ссылку, куда должен перейти пользователь
            const finalLink = 'YOUR_FINAL_LINK_HERE'; // <-- Вставьте сюда вашу финальную ссылку!

            if (finalLink && finalLink !== 'YOUR_FINAL_LINK_HERE') {
                window.open(finalLink, '_blank'); // Открываем ссылку в новой вкладке
            } else {
                alert("Ссылка на приз пока не установлена. Пожалуйста, проверьте настройки.");
            }
        }

        // Инициализация: делаем первый слайд активным при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            if (slides.length > 0) {
                slides[0].classList.add('active');
            }
        });
    </script>
</body>
</html>
