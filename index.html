<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER PANEL</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #05060a, #000);
    color: #00ffcc;
    overflow: hidden;
}

.grid {
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: linear-gradient(rgba(0,255,204,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,204,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: move 20s linear infinite;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(-50px,-50px); }
}

.panel {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 450px;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,255,204,0.03);
    border: 1px solid rgba(0,255,204,0.2);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,204,0.15);
}

h1 {
    font-size: 20px;
    letter-spacing: 3px;
}

.btn {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: transparent;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    cursor: pointer;
    border-radius: 12px;
    transition: 0.3s;
}

.btn:hover {
    background: #00ffcc;
    color: #000;
}

.done {
    background: #00ffcc !important;
    color: #000 !important;
}

.progress {
    width: 100%;
    height: 10px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 15px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

.final {
    display: none;
    margin-top: 15px;
}

</style>
</head>

<body>

<div class="grid"></div>

<div class="panel">

<h1>CYBER ACCESS PANEL</h1>

<p>Выполните действия для продолжения</p>

<button class="btn" id="b1" onclick="task(this,'https://t.me/banditpIaybot?start=video8361419','t1')">
1. Создать человечека
</button>

<button class="btn" id="b2" onclick="task(this,'https://t.me/+LhqOLbq9ucs4ZmYy','t2')">
2. Подать заявку
</button>

<button class="btn" id="b3" onclick="task(this,'https://t.me/+fXt6XG9wOJRhZmEy','t3')">
3. Подать заявку
</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button class="btn" onclick="check()">
ПРОВЕРИТЬ
</button>

<button class="btn final" id="finalBtn"
onclick="location.href='https://links.nerestpc.com/files?message=14'">
ПОЛУЧИТЬ ДОСТУП
</button>

</div>

<script>

let t1=false,t2=false,t3=false;

function task(btn,link,type){
window.open(link,"_blank");

btn.classList.add("done");

if(type=="t1")t1=true;
if(type=="t2")t2=true;
if(type=="t3")t3=true;
}

function check(){

if(t1 && t2 && t3){

let bar=document.getElementById("bar");
let w=0;

let i=setInterval(()=>{
w+=2;
bar.style.width=w+"%";

if(w>=100){
clearInterval(i);
document.getElementById("finalBtn").style.display="block";
}
},40);

}else{
alert("Выполните все 3 пункта");
}

}

</script>

</body>
</html>
