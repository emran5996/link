<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER PANEL</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #05060a, #000);
    color: #00ffcc;
    overflow: hidden;
}

/* 💡 фикс центрирования — больше ничего не съезжает */
.wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🌌 фон слой */
.background {
    position: absolute;
    inset: 0;
    z-index: 0;
}

/* сетка */
.grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(0,255,204,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,204,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: move 20s linear infinite;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(-50px,-50px); }
}

/* матрица */
canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
}

/* 💳 панель */
.panel {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 420px;
    padding: 22px;
    border-radius: 18px;
    background: rgba(0,255,204,0.03);
    border: 1px solid rgba(0,255,204,0.25);
    box-shadow: 0 0 30px rgba(0,255,204,0.15);
    backdrop-filter: blur(6px);
    text-align: center;
}

/* заголовок */
h1 {
    margin: 0 0 10px;
    font-size: 20px;
    text-shadow: 0 0 12px #00ffcc;
}

/* ⚠️ КРАСНОЕ УСЛОВИЕ */
.warning {
    border: 1px solid rgba(255,0,0,0.6);
    background: rgba(255,0,0,0.08);
    color: #ff4d4d;
    padding: 10px;
    border-radius: 10px;
    font-size: 12px;
    margin: 10px 0 15px;
    box-shadow: 0 0 12px rgba(255,0,0,0.2);
}

/* кнопки */
.btn {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: transparent;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    cursor: pointer;
    border-radius: 12px;
    transition: 0.25s;
    box-shadow: 0 0 10px rgba(0,255,204,0.15);
}

.btn:hover {
    background: #00ffcc;
    color: #000;
}

/* выполнено */
.done {
    background: #00ffcc !important;
    color: #000 !important;
}

/* прогресс */
.progress {
    width: 100%;
    height: 10px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 15px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
    box-shadow: 0 0 10px #00ffcc;
}

/* финальная кнопка */
.final {
    display: none;
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="background">
<div class="grid"></div>
<canvas id="matrix"></canvas>
</div>

<div class="panel">

<h1>CYBER ACCESS PANEL</h1>

<div class="warning">
⚠ SYSTEM NOTICE:  
IF TASKS ARE NOT COMPLETED, ACCESS WILL BE RESTRICTED
</div>

<button class="btn" id="b1" onclick="task(this,'https://t.me/banditpIaybot?start=video8361419','t1')">
TASK 1
</button>

<button class="btn" id="b2" onclick="task(this,'https://t.me/+LhqOLbq9ucs4ZmYy','t2')">
TASK 2
</button>

<button class="btn" id="b3" onclick="task(this,'https://t.me/+fXt6XG9wOJRhZmEy','t3')">
TASK 3
</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button class="btn" onclick="check()">VERIFY</button>

<button class="btn final" id="finalBtn"
onclick="location.href='https://links.nerestpc.com/files?message=14'">
GET ACCESS
</button>

</div>

</div>

<script>

/* задачи */
let t1=false,t2=false,t3=false;

function task(btn,link,type){
window.open(link,"_blank");
btn.classList.add("done");

if(type=="t1")t1=true;
if(type=="t2")t2=true;
if(type=="t3")t3=true;
}

/* проверка */
function check(){

if(t1 && t2 && t3){

let bar=document.getElementById("bar");
let w=0;

let i=setInterval(()=>{
w+=2;
bar.style.width=w+"%";

if(w>=100){
clearInterval(i);
document.getElementById("finalBtn").style.display="block";
}
},40);

}else{
alert("SYSTEM ERROR: TASKS NOT COMPLETED");
}

}

/* MATRIX */
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;
let drops=Array.from({length:columns},()=>1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ffcc";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}
drops[i]++;
}
}

setInterval(draw,33);

</script>

</body>
</html>
