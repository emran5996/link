<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emr1k_client</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    overflow-x: hidden;
}

/* ОБЩИЙ КОНТЕЙНЕР */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

.active {
    display: flex;
}

/* КАРТОЧКА */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    max-width: 400px;
    width: 100%;
}

/* КНОПКИ */
.btn {
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

.btn-purple {
    background: linear-gradient(45deg, #6a00ff, #a100ff);
    color: white;
}

.btn-green {
    background: linear-gradient(45deg, #00c853, #64dd17);
    color: white;
}

.btn-red {
    background: linear-gradient(45deg, #ff1744, #ff5252);
    color: white;
}

.btn:hover {
    opacity: 0.8;
}

/* ВАЖНЫЙ БЛОК */
.warning {
    margin-top: 15px;
    padding: 10px;
    border: 1px solid red;
    border-radius: 10px;
    color: #ff6b6b;
}

/* КАРТИНКА */
.product-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}

/* ПРОГРЕСС БАР */
.progress {
    width: 100%;
    height: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 20px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    transition: width 0.2s;
}

</style>
</head>

<body>

<!-- СЛАЙД 1 -->
<div class="slide active" id="slide1">
    <div class="card">
        
        <!-- 🔧 ЗАМЕНИ ЗАГОЛОВОК -->
        <h1>ПОЛУЧИ ПРОДУКТ</h1>

        <!-- 🔧 ВСТАВЬ ССЫЛКУ НА КАРТИНКУ -->
        <img src="ССЫЛКА_НА_КАРТИНКУ" class="product-img">

        <!-- 🔧 ТЕКСТ -->
        <p>Нажмите кнопку ниже чтобы продолжить</p>

        <button class="btn btn-purple" onclick="nextSlide(2)">
            Продолжить
        </button>

    </div>
</div>

<!-- СЛАЙД 2 -->
<div class="slide" id="slide2">
    <div class="card">

        <!-- 🔧 ТЕКСТ -->
        <h2>Для получения продукта</h2>
        <p>Выполните все действия ниже</p>

        <div class="warning">
            ⚠️ Важно: необходимо выполнить все шаги для получения доступа
        </div>

        <!-- 🔧 ССЫЛКА НА БОТА -->
        <button class="btn btn-red" onclick="markDone(this, 'https://t.me/ССЫЛКА_БОТА')">
            Перейти в бота
        </button>

        <!-- 🔧 ССЫЛКА НА КАНАЛ -->
        <button class="btn btn-red" onclick="markDone(this, 'https://t.me/ССЫЛКА_КАНАЛА')">
            Подписаться
        </button>

        <button class="btn btn-green" onclick="checkTasks()">
            Проверить выполнение
        </button>

    </div>
</div>

<!-- СЛАЙД 3 -->
<div class="slide" id="slide3">
    <div class="card">

        <h2>Подготовка доступа...</h2>
        <p>Пожалуйста подождите</p>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

    </div>
</div>

<!-- СЛАЙД 4 -->
<div class="slide" id="slide4">
    <div class="card">

        <!-- 🔧 ТЕКСТ -->
        <h2>Доступ готов!</h2>
        <p>Нажмите кнопку ниже чтобы получить</p>

        <!-- 🔧 ССЫЛКА НА ПРОДУКТ -->
        <button class="btn btn-purple" onclick="window.location.href='ССЫЛКА_НА_ПРОДУКТ'">
            Получить
        </button>

    </div>
</div>

<script>

let botClicked = false;
let channelClicked = false;

function nextSlide(num) {
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
    document.getElementById('slide' + num).classList.add('active');
}

function markDone(btn, link) {
    window.open(link, "_blank");
    btn.classList.remove('btn-red');
    btn.classList.add('btn-green');

    if (btn.innerText.includes("бота")) botClicked = true;
    if (btn.innerText.includes("Подписаться")) channelClicked = true;
}

function checkTasks() {
    if (botClicked && channelClicked) {
        nextSlide(3);
        startProgress();
    } else {
        alert("Выполните все действия!");
    }
}

function startProgress() {
    let bar = document.getElementById("progressBar");
    let width = 0;

    let interval = setInterval(() => {
        width += 2;
        bar.style.width = width + "%";

        if (width >= 100) {
            clearInterval(interval);
            setTimeout(() => nextSlide(4), 500);
        }
    }, 80);
}

</script>

</body>
</html>
